server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compresión gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/x-javascript image/svg+xml
               application/font-woff2;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Cache de assets estáticos (hash en nombre = inmutables) ─────────────
    location ~* \.(js|css|woff2|woff|ttf|ico|png|jpg|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Proxy al backend (mismo host, ruta /api) ────────────────────────────
    location /api/ {
        proxy_pass         http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        # Subida de archivos hasta 20 MB (documentos junta)
        client_max_body_size 20M;
    }

    # ── SPA: todas las rutas sirven index.html ───────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Seguridad: ocultar versión nginx ────────────────────────────────────
    server_tokens off;
}
