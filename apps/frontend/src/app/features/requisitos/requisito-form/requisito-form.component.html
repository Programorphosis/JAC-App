<mat-card>
  <mat-card-header>
    <mat-card-title>Nuevo requisito</mat-card-title>
    <mat-card-subtitle>Ej: Agua, Basura, etc.</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="nombre" />
      </mat-form-field>
      <mat-checkbox formControlName="tieneCorteAutomatico">Corte automático día 1</mat-checkbox>
      <div class="flex gap-2">
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Crear</button>
        <button mat-button type="button" (click)="onCancelar()">Cancelar</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
