@if (junta.admin) {
  <mat-card class="mt-4">
    <mat-card-header>
      <mat-card-title>Admin de junta</mat-card-title>
      <mat-card-subtitle>
        {{ junta.admin.nombres }} {{ junta.admin.apellidos }} · {{ junta.admin.numeroDocumento }}
        @if (!junta.admin.activo) {
          <span class="text-red-600">(bloqueado)</span>
        }
      </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="flex flex-wrap gap-2 mt-2">
        <button mat-stroked-button (click)="resetPassword.emit()">Reset contraseña</button>
        <button mat-stroked-button (click)="reenviarCredenciales.emit()">Reenviar credenciales</button>
        <button mat-stroked-button (click)="cambiarAdmin.emit()">Cambiar admin</button>
        @if (junta.admin.activo) {
          <button mat-stroked-button color="warn" (click)="bloquearAdmin.emit()">Bloquear admin</button>
        }
      </div>
    </mat-card-content>
  </mat-card>
}
