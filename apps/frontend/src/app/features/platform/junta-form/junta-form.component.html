<mat-card>
  <mat-card-header>
    <mat-card-title>{{ modoEdicion ? 'Editar junta' : 'Crear junta' }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <mat-form-field appearance="outline">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="nombre" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>NIT</mat-label>
        <input matInput formControlName="nit" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Monto carta (COP)</mat-label>
        <input matInput formControlName="montoCarta" type="number" />
      </mat-form-field>

      @if (!modoEdicion) {
        <h3 class="text-lg font-medium">Admin inicial</h3>
        <mat-form-field appearance="outline">
          <mat-label>Nombres</mat-label>
          <input matInput formControlName="adminNombres" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Apellidos</mat-label>
          <input matInput formControlName="adminApellidos" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Tipo documento</mat-label>
          <mat-select formControlName="adminTipoDocumento">
            <mat-option value="CC">CC</mat-option>
            <mat-option value="CE">CE</mat-option>
            <mat-option value="TI">TI</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Número documento</mat-label>
          <input matInput formControlName="adminNumeroDocumento" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Teléfono</mat-label>
          <input matInput formControlName="adminTelefono" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Dirección</mat-label>
          <input matInput formControlName="adminDireccion" />
        </mat-form-field>
      }

      <div class="flex gap-2">
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          {{ modoEdicion ? 'Guardar' : 'Crear' }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
