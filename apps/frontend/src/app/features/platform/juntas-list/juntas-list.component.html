<div class="flex flex-col gap-4">
  <div class="flex justify-between items-center">
    <h2>Juntas</h2>
    <button mat-raised-button color="primary" (click)="crear()">
      Crear junta
    </button>
  </div>

  <div class="overflow-x-auto">
    <table mat-table [dataSource]="dataSource" class="w-full">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let row">{{ row.nombre }}</td>
      </ng-container>
      <ng-container matColumnDef="nit">
        <th mat-header-cell *matHeaderCellDef>NIT</th>
        <td mat-cell *matCellDef="let row">{{ row.nit || '-' }}</td>
      </ng-container>
      <ng-container matColumnDef="montoCarta">
        <th mat-header-cell *matHeaderCellDef>Monto carta</th>
        <td mat-cell *matCellDef="let row">
          {{ row.montoCarta != null ? (row.montoCarta | number) + ' COP' : '-' }}
        </td>
      </ng-container>
      <ng-container matColumnDef="fechaCreacion">
        <th mat-header-cell *matHeaderCellDef>Fecha creación</th>
        <td mat-cell *matCellDef="let row">{{ formatearFecha(row.fechaCreacion) }}</td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button (click)="ver(row.id)" aria-label="Ver">
            <mat-icon>visibility</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" [attr.colspan]="displayedColumns.length">
          {{ loading ? 'Cargando...' : 'No hay juntas' }}
        </td>
      </tr>
    </table>

    <mat-paginator
      [length]="total"
      [pageSize]="limit"
      [pageIndex]="page - 1"
      [pageSizeOptions]="[5, 10, 20]"
      (page)="onPage($event)"
    >
    </mat-paginator>
  </div>
</div>
