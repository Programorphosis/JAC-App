<div class="max-w-5xl mx-auto">
  <header class="mb-8">
    <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-1">Panel de administración</h1>
    <p class="text-gray-600">Gestión de Juntas de Acción Comunal</p>
  </header>

  <section>
    <h2 class="text-lg font-semibold text-gray-800 mb-4">Accesos directos</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <a routerLink="/platform/juntas" class="block group">
        <mat-card class="h-full transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5 border border-gray-100 overflow-hidden">
          <mat-card-content class="p-4">
            <div class="flex items-start gap-3">
              <div class="flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center bg-blue-100 text-blue-700">
                <mat-icon fontIcon="business" class="!text-2xl !w-8 !h-8"></mat-icon>
              </div>
              <div class="min-w-0 flex-1">
                <h3 class="font-semibold text-gray-800 group-hover:text-blue-600 transition-colors">Juntas</h3>
                <p class="text-sm text-gray-600 mt-1">Listado de juntas. Ver, crear y gestionar.</p>
              </div>
              <mat-icon class="flex-shrink-0 text-gray-400 group-hover:text-blue-500 transition-colors">arrow_forward</mat-icon>
            </div>
          </mat-card-content>
        </mat-card>
      </a>
      <a routerLink="/platform/juntas/nueva" class="block group">
        <mat-card class="h-full transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5 border border-gray-100 overflow-hidden">
          <mat-card-content class="p-4">
            <div class="flex items-start gap-3">
              <div class="flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center bg-teal-100 text-teal-700">
                <mat-icon fontIcon="add_business" class="!text-2xl !w-8 !h-8"></mat-icon>
              </div>
              <div class="min-w-0 flex-1">
                <h3 class="font-semibold text-gray-800 group-hover:text-blue-600 transition-colors">Nueva junta</h3>
                <p class="text-sm text-gray-600 mt-1">Registrar una nueva Junta de Acción Comunal.</p>
              </div>
              <mat-icon class="flex-shrink-0 text-gray-400 group-hover:text-blue-500 transition-colors">arrow_forward</mat-icon>
            </div>
          </mat-card-content>
        </mat-card>
      </a>
    </div>
  </section>
</div>
