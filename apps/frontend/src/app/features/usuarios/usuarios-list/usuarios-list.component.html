<div class="flex flex-col gap-4">
  <div class="flex items-center justify-between">
    <h2>Usuarios</h2>
    @if (puedeCrearUsuario()) {
      <button mat-raised-button color="primary" (click)="crear()">Nuevo usuario</button>
    }
  </div>

  <div class="mat-elevation-z2 overflow-hidden rounded">
    <table mat-table [dataSource]="dataSource" class="w-full">
      <ng-container matColumnDef="documento">
        <th mat-header-cell *matHeaderCellDef>Documento</th>
        <td mat-cell *matCellDef="let u">{{ documento(u) }}</td>
      </ng-container>
      <ng-container matColumnDef="nombres">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let u">{{ u.nombres }} {{ u.apellidos }}</td>
      </ng-container>
      <ng-container matColumnDef="roles">
        <th mat-header-cell *matHeaderCellDef>Roles</th>
        <td mat-cell *matCellDef="let u">{{ roles(u) }}</td>
      </ng-container>
      <ng-container matColumnDef="activo">
        <th mat-header-cell *matHeaderCellDef>Activo</th>
        <td mat-cell *matCellDef="let u">{{ u.activo ? 'Sí' : 'No' }}</td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let u">
          <button mat-icon-button (click)="ver(u.id)" aria-label="Ver">
            <mat-icon>visibility</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" [attr.colspan]="displayedColumns.length">
          @if (loading) {
            Cargando...
          } @else {
            No hay usuarios
          }
        </td>
      </tr>
    </table>
    <mat-paginator
      [length]="total"
      [pageSize]="limit"
      [pageSizeOptions]="[5, 10, 20]"
      (page)="onPage($event)"
      showFirstLastButtons
    ></mat-paginator>
  </div>
</div>
