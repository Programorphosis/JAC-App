<div class="flex flex-col gap-4">
  <h2>Cartas pendientes</h2>
  <p>Cartas solicitadas que requieren validación (deuda=0, requisitos al día, pago carta).</p>

  <div class="mat-elevation-z2 overflow-hidden rounded">
    <table mat-table [dataSource]="dataSource" class="w-full">
      <ng-container matColumnDef="usuario">
        <th mat-header-cell *matHeaderCellDef>Usuario</th>
        <td mat-cell *matCellDef="let c">{{ nombreUsuario(c) }}</td>
      </ng-container>
      <ng-container matColumnDef="documento">
        <th mat-header-cell *matHeaderCellDef>Documento</th>
        <td mat-cell *matCellDef="let c">{{ c.usuarioDocumento }}</td>
      </ng-container>
      <ng-container matColumnDef="fechaSolicitud">
        <th mat-header-cell *matHeaderCellDef>Fecha solicitud</th>
        <td mat-cell *matCellDef="let c">{{ formatearFecha(c.fechaSolicitud) }}</td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let c">
          <button mat-raised-button color="primary" (click)="validar(c)">Validar carta</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" [attr.colspan]="displayedColumns.length">
          @if (loading) {
            Cargando...
          } @else {
            No hay cartas pendientes
          }
        </td>
      </tr>
    </table>
  </div>
</div>
