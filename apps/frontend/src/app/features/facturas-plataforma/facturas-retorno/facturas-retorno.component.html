<div class="flex flex-col gap-4 max-w-md mx-auto mt-8">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Retorno de pago de factura</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (loading) {
        <div class="flex justify-center py-8">
          <mat-spinner diameter="40"></mat-spinner>
        </div>
        <p class="text-center">Verificando pago...</p>
      } @else if (resultado) {
        @if (resultado.registrado) {
          <p class="text-green-700 font-semibold">{{ resultado.mensaje }}</p>
        } @else {
          <p class="text-amber-700 font-medium">{{ resultado.mensaje }}</p>
        }
        <button mat-raised-button color="primary" (click)="volver()" class="mt-4">
          Volver a facturas
        </button>
      }
    </mat-card-content>
  </mat-card>
</div>
