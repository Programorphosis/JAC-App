# ──────────────────────────────────────────────────────────────────────────
# Override PRODUCCIÓN – JAC App
#
# Inyecta env_file (.env.production) y, opcionalmente, imágenes pre-construidas.
#
# FLUJO con build en servidor:
#   1. cp .env.production.example .env.production
#   2. Editar .env.production (DOMAIN, DB_PASSWORD, JWT_SECRET, etc.)
#   3. docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# FLUJO con imágenes pre-construidas:
#   1. Definir DOCKER_IMAGE_PREFIX en .env.production (ej. "tuusuario")
#   2. docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production pull
#   3. docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d
# ──────────────────────────────────────────────────────────────────────────

services:
  backend:
    env_file:
      - .env.production
