# Prometheus — JAC App
# Raspa métricas cada 15s.
# Cuando el backend exponga /metrics, añadir:
#   - job_name: 'backend'
#     static_configs:
#       - targets: ['backend:3000']

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
